<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Card</title>
    <link rel="stylesheet" href="./output.css">
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>

<body class="bg-gray-900 flex justify-center items-center min-h-screen">
    <div class="bg-gray-700 rounded-xl px-8 py-10 drop-shadow-2xl max-w-sm w-full">
        <h2 class="text-center font-bold text-3xl text-sky-500 mb-8">Sign Up</h2>
        <form>
            <div class="flex items-center mb-3">
                <div>
                    <label class=" text-gray-300 text-xs"><b>First Name</b></label>
                    <input
                    class="bg-white mr-1.5 text-center border-2 border-gray-400 focus:border-2 focus:border-gray-800 outline-none rounded-md py-1 w-full"
                    type="email" placeholder="first name">
                </div>
                <div>
                    <label class="text-gray-300 ml-1.5 text-xs"><b>Last Name</b></label>
                    <input
                    class="bg-white ml-1.5 text-center border-2 border-gray-400 focus:border-2 focus:border-gray-800 outline-none rounded-md py-1 w-full"
                    type="email" placeholder="last name">
                </div>
            </div>
            <div class="flex items-center mb-3">
                <label class="mr-8 text-gray-300 text-xs"><b>Email</b></label>
                <input
                    class="bg-white text-center border-2 border-gray-400 focus:border-2 focus:border-gray-800 outline-none rounded-md py-1 w-full"
                    type="email" placeholder="enter email">
            </div>
            <div class="flex items-center mb-3">
                <label class="mr-1 text-gray-300 text-xs"><b>Password</b></label>
                <input
                    class="bg-white text-center border-2 border-gray-400 focus:border-2 focus:border-gray-800 outline-none rounded-md py-1 w-full"
                    type="password" placeholder="enter password">
            </div>
            <div class="flex justify-center items-center">
                <button class=" bg-blue-600 py-2 px-15 rounded-xl mt-2 text-white hover:bg-blue-700"
                    type="submit">Sign Up</button>
            </div>
        </form>
    </div>
</body>

</html>
