<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Manager</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <header>
        <nav>
            <div class="logo">
                <img src="./img/password.svg" alt="logo">
                <span>iPassword</span>
            </div>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- <div class="heading">

        <h1>Password Manager</h1>
        <p>
            We're thrilled to have you here. Your digital life contains a myriad of passwords, and we know how
            challenging it can be to manage them all. That's why we're here to make it easy for you.
        </p>
    </div> -->
    <div class="container">

            <div class="inputSection">
                
            <h2>Add a Passwords</h2>
            <form action="" method="">
                
                    <label for="website">Website:</label>
                    <input placeholder="example.com" type="text" id="website" name="website" required>

                    <label for="username">Username/Email:</label>
                    <input placeholder="username or email" type="text" id="username" name="username" required>
                
                <div class="passBox">
                    <label style="display: flex;" for="password">Password:</label>
                    <input placeholder="enter password" type="password" id="password" name="password" required>
                    <span class="togglePass">👁️</span>
                </div>

                <input id="submitBtn" type="submit" value="Add">
                
            </form>
        </div>

        <div class="outputSection">
                
                <h2>Your Passwords</h2>
                <div class="copyAlert">Copied!</div>
                <table id="table">
                    <tr>
                        <th>Website</th>
                        <th>Username/Email</th>
                        <th>Password</th>
                        <th>Delete</th>
                    </tr>
                    
                </table>
            </div>
    </div>

    <footer>
        Copyright | iPassword.com | All Rights reserved
    </footer>

    <script src="./script.js"></script>
</body>

</html>
